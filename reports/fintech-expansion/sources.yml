rules:
  - 搜索不足时扩大市场、主题和信源覆盖，不得扩大 48 小时时间上限。
  - 每个候选事件必须记录原始发布时间、事件时间和抓取时间。
  - 监管政策必须优先引用监管机构原文。
  - 融资、用户数、收入和交易规模优先引用公司公告或财报。
  - 媒体报道用于发现线索，关键事实尽量回到一手来源。
  - 付费墙或无法访问的来源不能作为唯一证据。
