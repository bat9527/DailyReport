market_data:
  - name: CoinGecko API
    url: https://docs.coingecko.com/
    use: aggregated_price_market_cap_dominance
    access: demo_key_or_keyless
  - name: Coinbase Exchange API
    url: https://docs.cdp.coinbase.com/api-reference/exchange-api/rest-api/products/get-product-candles
    use: btc_eth_spot_candles_and_volume_cross_check
    access: public
  - name: Deribit Public API
    url: https://docs.deribit.com/api-reference/market-data/public-ticker
    use: btc_eth_funding_open_interest_mark_and_index
    access: public
  - name: DefiLlama Free API
    url: https://api-docs.defillama.com/
    use: tvl_stablecoins_dex_volume_fees_and_open_interest
    access: public

