name: Build and deploy DailyReport

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-pages.yml"
      - ".vitepress/**"
      - "archive.data.ts"
      - "archive.md"
      - "index.md"
      - "package.json"
      - "package-lock.json"
      - "public/**"
      - "scripts/**"
      - "reports/**"
      - "shared/**"
      - "PROJECT_PLAN.md"
  pull_request:
    paths:
      - ".github/workflows/deploy-pages.yml"
      - ".vitepress/**"
      - "archive.data.ts"
      - "archive.md"
      - "index.md"
      - "package.json"
      - "package-lock.json"
      - "public/**"
      - "scripts/**"
      - "reports/**"
      - "shared/**"
      - "PROJECT_PLAN.md"
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress site
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .vitepress/dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
