name: Build and deploy DailyReport

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-pages.yml"
      - "astro.config.mjs"
      - "package.json"
      - "package-lock.json"
      - "public/**"
      - "scripts/**"
      - "src/**"
      - "reports/**"
      - "shared/**"
      - "PROJECT_PLAN.md"
  pull_request:
    paths:
      - ".github/workflows/deploy-pages.yml"
      - "astro.config.mjs"
      - "package.json"
      - "package-lock.json"
      - "public/**"
      - "scripts/**"
      - "src/**"
      - "reports/**"
      - "shared/**"
      - "PROJECT_PLAN.md"
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build Astro site
        uses: withastro/action@v6

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
