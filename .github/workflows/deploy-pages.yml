name: Build and deploy DailyReport

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-pages.yml"
      - "mkdocs.yml"
      - "requirements.txt"
      - "scripts/**"
      - "site_overrides/**"
      - "reports/**"
      - "shared/**"
      - "PROJECT_PLAN.md"
  pull_request:
    paths:
      - ".github/workflows/deploy-pages.yml"
      - "mkdocs.yml"
      - "requirements.txt"
      - "scripts/**"
      - "site_overrides/**"
      - "reports/**"
      - "shared/**"
      - "PROJECT_PLAN.md"
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install site dependencies
        run: pip install --requirement requirements.txt

      - name: Prepare report pages
        run: python scripts/prepare_site.py

      - name: Build site
        run: mkdocs build --config-file mkdocs.generated.yml --strict

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
